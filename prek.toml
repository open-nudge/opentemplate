default_stages = [
  "pre-commit",
]
default_install_hook_types = [
  "pre-commit",
  "commit-msg",
  "pre-push",
  "post-checkout",
  "post-merge",
]
fail_fast = true

##############################################################################
#
#                       NON PYPROJECT BASED CHECKS
#
##############################################################################

[[repos]]
repo = "builtin"

  [[repos.hooks]]
  id = "trailing-whitespace"
  verbose = true
  name = "<<<FIX>>> Trailing whitespace"
  priority = 60

  [[repos.hooks]]
  id = "end-of-file-fixer"
  alias = "eof-fixer"
  verbose = true
  name = "<<<FIX>>> End of file"
  priority = 70

  [[repos.hooks]]
  id = "mixed-line-ending"
  verbose = true
  args = ["--fix=lf"]
  name = "<<<FIX>>> Mixed line endings"
  priority = 80

  [[repos.hooks]]
  id = "check-added-large-files"
  alias = "large-files"
  verbose = true
  name = "<<<CHECK>>> No large files"
  priority = 10

  [[repos.hooks]]
  id = "check-case-conflict"
  alias = "case-conflict"
  verbose = true
  name = "<<<CHECK>>> Case conflict"
  priority = 10

  [[repos.hooks]]
  id = "check-symlinks"
  alias = "symlinks"
  verbose = true
  name = "<<<CHECK>>> Symlinks"
  priority = 10

  [[repos.hooks]]
  id = "check-merge-conflict"
  alias = "merge-conflict"
  verbose = true
  name = "<<<CHECK>>> Merge conflicts"
  priority = 10

  [[repos.hooks]]
  id = "no-commit-to-branch"
  alias = "main-branch"
  verbose = true
  name = "<<<CHECK>>> Main branch"
  priority = 10

  [[repos.hooks]]
  id = "check-executables-have-shebangs"
  alias = "executables"
  verbose = true
  name = "<<<CHECK>>> Executables"
  priority = 10

  # Language specific checks
  [[repos.hooks]]
  id = "check-json"
  alias = "json"
  verbose = true
  name = "<<<CHECK>>> JSON syntax"
  priority = 10

  [[repos.hooks]]
  id = "check-json5"
  alias = "json5"
  verbose = true
  name = "<<<CHECK>>> JSON5 syntax"
  priority = 10

  [[repos.hooks]]
  id = "check-toml"
  alias = "toml"
  verbose = true
  name = "<<<CHECK>>> TOML syntax"
  priority = 10

  [[repos.hooks]]
  id = "check-xml"
  alias = "xml"
  verbose = true
  name = "<<<CHECK>>> XML syntax"
  priority = 10

[[repos]]
repo = "meta"

  [[repos.hooks]]
  id = "check-useless-excludes"
  alias = "prek-useless"
  verbose = true
  name = "<<<CHECK>>> prek Useless excludes"
  priority = 10

[[repos]]
repo = "https://github.com/siderolabs/conform"
rev = "cfdb3cce90daece912e6a5cb3f20b2316a78a5bf" # frozen: v0.1.0-alpha.31

  [[repos.hooks]]
  id = "conform"
  alias = "policy"
  name = "<<<CHECK>>> Policy"
  verbose = true
  stages = [
    "pre-push",
  ]
  entry = "conform enforce"
  pass_filenames = false
  priority = 10


[[repos]]
repo = "https://github.com/trufflesecurity/trufflehog"
rev = "586f66d7886cd0b037c7c245d4a6e34ef357ab10" # frozen: v3.94.1

  [[repos.hooks]]
  id = "trufflehog"
  alias = "secrets"
  name = "<<<CHECK>>> Secrets"
  verbose = true
  priority = 10

[[repos]]
repo = "https://github.com/google/osv-scanner/"
rev = "30bcc134e23fbc35731021ee43ec433c483715d7" # frozen: v2.3.5

  [[repos.hooks]]
  id = "osv-scanner"
  name = "<<<CHECK>>> OSV Scanner"
  args = [
    "-r",
    "--licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,Unlicense,Zlib,OFL-1.1,0BSD,PSF-2.0",
    "./",
  ]
  priority = 10


[[repos]]
repo = "https://github.com/errata-ai/vale"
rev = "41f3b223e8cc669d1309a2104e5b70df2ae6a5a8" # frozen: v3.14.1

  [[repos.hooks]]
  id = "vale"
  alias = "setup-natural-language"
  entry = "vale sync"
  name = "<<<SETUP>>> Natural language"
  verbose = true
  pass_filenames = false
  require_serial = true
  stages = ["pre-commit"]
  priority = 10

  [[repos.hooks]]
  id = "vale"
  alias = "natural-language"
  name = "<<<CHECK>>> Natural language"
  verbose = true
  priority = 20

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "393031adb9afb225ee52ae2ccd7a5af5525e03e8" # frozen: v1.7.11

  [[repos.hooks]]
  id = "actionlint"
  alias = "github-actions-actionlint"
  name = "<<<CHECK>>> GitHub Actions actionlint"
  verbose = true
  priority = 70

##############################################################################
#
#                         PYPROJECT BASED CHECKS
#
##############################################################################

[[repos]]
repo = "local"

  [[repos.hooks]]
  id = "pdm-sync"
  alias = "sync"
  verbose = true
  name = "<<<CHECK>>> PDM sync"
  entry = "pdm sync -v"
  pass_filenames = false
  language = "system"
  stages = ["post-checkout", "post-merge"]
  always_run = true
  # Different sync moment
  priority = 30

  [[repos.hooks]]
  id = "dco"
  verbose = true
  name = "<<<CHECK>>> DCO"
  language = "fail"
  entry = """
  Changing DCO is prohibited according to the DCO itself.
  If you wish to change/remove it, please do so in a separate commit
  and disable this check.
  """
  files = "^DCO.md$"
  # Should never be touched, indifferent to all the checks
  priority = 30

  [[repos.hooks]]
  id = "commit"
  verbose = true
  name = "<<<CHECK>>> Commit"
  entry = "pdm run -v check-commit"
  language = "system"
  stages = ["commit-msg"]
  always_run = true
  # Commit message, largely unrelated
  priority = 30


  [[repos.hooks]]
  id = "pdm-lock"
  verbose = true
  name = "<<<CHECK>>> PDM lock (use `pdm run lock` to fix)"
  entry = "pdm lock -v --check"
  pass_filenames = false
  language = "system"
  files = "^pyproject.toml$"
  priority = 30

  [[repos.hooks]]
  id = "prek"
  verbose = true
  name = "<<<FIX>>> Prek"
  entry = "pdm run -v prek autoupdate --freeze"
  pass_filenames = false
  language = "system"
  require_serial = true
  always_run = true
  # PDM and prek are essentially independent
  priority = 30

  [[repos.hooks]]
  id = "generation"
  verbose = true
  name = "<<<FIX>>> Generation"
  entry = "pdm run -v fix-generation"
  pass_filenames = false
  language = "system"
  require_serial = true
  always_run = true
  # Second pass
  priority = 40

  [[repos.hooks]]
  id = "fix-legal"
  name = "<<<FIX>>> Legal"
  entry = "pdm run -v fix-legal"
  language = "system"
  require_serial = true
  exclude = "^(pdm.lock.*|DCO.md|.gitignore|LICENSE.md|LICENSES/.*)$"
  priority = 50

  [[repos.hooks]]
  id = "text"
  verbose = true
  name = "<<<FIX>>> Text"
  entry = "pdm run -v fix-text"
  language = "system"
  require_serial = true
  types = ["text"]
  priority = 60

  [[repos.hooks]]
  id = "check-legal"
  verbose = true
  name = "<<<CHECK>>> Legal"
  entry = "pdm run -v check-legal"
  language = "system"
  require_serial = true
  pass_filenames = false
  priority = 70

  [[repos.hooks]]
  id = "github"
  verbose = true
  name = "<<<CHECK>>> GitHub"
  entry = "pdm run -v check-github"
  language = "system"
  require_serial = true
  types = ["file"]
  files = "^(.github/actions/.*/action.yml|.github/workflows/.*.yml)$"
  priority = 70

  [[repos.hooks]]
  id = "github-actions"
  verbose = true
  name = "<<<CHECK>>> GitHub Actions"
  entry = "pdm run -v check-github-actions"
  language = "system"
  require_serial = true
  types = ["file"]
  files = "^.github/actions/.*/action.yml$"
  priority = 70

  [[repos.hooks]]
  id = "github-workflows"
  verbose = true
  name = "<<<CHECK>>> GitHub Workflows"
  entry = "pdm run -v check-github-workflows"
  language = "system"
  require_serial = true
  types = ["file"]
  files = "^.github/workflows/.*.yml$"
  priority = 70

  [[repos.hooks]]
  id = "pyproject"
  verbose = true
  name = "<<<CHECK>>> pyproject"
  entry = "pdm run -v check-pyproject"
  files = "^pyproject.toml$"
  language = "system"
  priority = 70

  [[repos.hooks]]
  id = "pre-commit-config"
  verbose = true
  name = "<<<CHECK>>> prek config"
  entry = "pdm run -v check-prek-config"
  files = "^.pre-commit-config.yaml$"
  language = "system"
  priority = 70

  [[repos.hooks]]
  id = "pre-commit-hooks"
  verbose = true
  name = "<<<CHECK>>> prek hooks"
  entry = "pdm run -v check-prek-hooks"
  files = "^.pre-commit-hooks.yaml$"
  language = "system"
  priority = 70

  [[repos.hooks]]
  id = "citation"
  verbose = true
  name = "<<<CHECK>>> Citation"
  entry = "pdm run -v check-citation"
  files = "^CITATION.cff$"
  language = "system"
  priority = 70

  [[repos.hooks]]
  id = "executable"
  verbose = true
  name = "<<<CHECK>>> Executable"
  entry = "pdm run -v check-executable"
  language = "system"
  require_serial = true
  types = ["executable"]
  priority = 70

  [[repos.hooks]]
  id = "ini"
  verbose = true
  name = "<<<CHECK>>> INI"
  entry = "pdm run -v check-ini"
  language = "system"
  require_serial = true
  types_or = ["ini", "editorconfig"]
  priority = 70

  [[repos.hooks]]
  id = "markdown"
  verbose = true
  name = "<<<FIX>>> Markdown"
  entry = "pdm run -v fix-markdown"
  language = "system"
  require_serial = true
  types = ["markdown"]
  exclude = "^(DCO.md|template-setup/.*|LICENSE.md|LICENSES/.*|.agents/.*)$"
  priority = 70

  [[repos.hooks]]
  id = "yaml"
  verbose = true
  name = "<<<CHECK>>> YAML"
  entry = "pdm run -v check-yaml"
  language = "system"
  require_serial = true
  types = ["yaml"]
  priority = 70

  [[repos.hooks]]
  id = "docs"
  verbose = true
  name = "<<<CHECK>>> Docs"
  entry = "pdm run -v check-docs"
  pass_filenames = false
  language = "system"
  require_serial = true
  types = ["file"]
  files = "^(docs/.*|pyproject.toml|mkdocs.yml|src/.*.py|.*.md)$"
  priority = 70

  [[repos.hooks]]
  id = "security"
  verbose = true
  name = "<<<CHECK>>> Security"
  entry = "pdm run -v check-security"
  language = "system"
  require_serial = true
  priority = 70

  [[repos.hooks]]
  id = "fix-shell"
  verbose = true
  name = "<<<FIX>>> Shell"
  entry = "pdm run -v fix-shell"
  language = "system"
  require_serial = true
  types = ["shell"]
  priority = 70

  [[repos.hooks]]
  id = "check-shell"
  verbose = true
  name = "<<<CHECK>>> Shell"
  entry = "pdm run -v check-shell"
  language = "system"
  require_serial = true
  types = ["shell"]
  priority = 80

  [[repos.hooks]]
  id = "python"
  verbose = true
  name = "<<<FIX>>> Python"
  entry = "pdm run -v fix-python"
  language = "system"
  require_serial = true
  types = ["python"]
  priority = 70

  [[repos.hooks]]
  id = "typing"
  verbose = true
  name = "<<<CHECK>>> Typing"
  entry = "pdm run -v check-typing"
  language = "system"
  require_serial = true
  types = ["python"]
  priority = 80

  [[repos.hooks]]
  id = "tests-all"
  verbose = true
  name = "<<<CHECK>>> Tests all"
  entry = "pdm run -v tests-all"
  pass_filenames = false
  language = "system"
  require_serial = true
  types = ["python"]
  priority = 90

  [[repos.hooks]]
  id = "release"
  name = "<<<CHECK>>> Release"
  entry = "pdm run -v check-release"
  pass_filenames = false
  language = "system"
  require_serial = true
  always_run = true
  priority = 90
