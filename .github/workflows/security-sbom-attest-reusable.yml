---
# enq: reusable workflows offload concurrency limits to the caller
name: "Security SBOM Attest Reusable"  # zizmor: ignore[concurrency-limits]

on:
  workflow_call:
    inputs:
      # SBOM
      artifact:
        description: >
          Name of the artifact to download.
          NOTE: SBOM should be in JSON format and be named as the artifact.
        type: "string"
        required: true
      # Other
      continue-on-error:
        description: "Whether to continue on error"
        type: "boolean"
        default: true

# enq: the only way to set permissions to none in GH Actions
permissions: {} # yamllint disable-line rule:braces

jobs:
  security-sbom-attest-reusable:
    name: "Security SBOM Attest Reusable"
    permissions:
      id-token: "write" # Needed to get GH Token to attest
      attestations: "write" # Needed to upload attestation
    timeout-minutes: 30
    runs-on: "ubuntu-latest"
    continue-on-error: "${{ inputs.continue-on-error }}"
    env:
      ATTESTATION_NAME: "attestation-${{ inputs.artifact }}.intoto.jsonl"
    steps:
      - name: "Harden Runner"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
        # yamllint enable rule:line-length
        with:
          disable-sudo-and-containers: true
          egress-policy: "block"
          allowed-endpoints: >
            api.github.com:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
      - name: "Download artifacts"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        # yamllint enable rule:line-length
        with:
          name: "${{ inputs.artifact }}"
      - name: "Attest SBOM"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34" # v3.0.0
        # yamllint enable rule:line-length
        id: "attestation"
        with:
          sbom-path: "${{ inputs.artifact }}.json"
          subject-checksums: "checksums.txt"
      - name: "Rename attestation"
        env:
          BUNDLE_PATH: "${{ steps.attestation.outputs.bundle-path }}"
        run: >
          mv "${BUNDLE_PATH}" "${ATTESTATION_NAME}"
      - name: "Upload SBOM attestation"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        # yamllint enable rule:line-length
        with:
          name: "attestation-${{ inputs.artifact }}"
          path: "attestation-${{ inputs.artifact }}.intoto.jsonl"
...
