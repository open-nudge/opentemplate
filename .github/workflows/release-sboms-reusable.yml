---
# enq: reusable workflows offload concurrency limits to the caller
name: "Release SBOMs Reusable"  # zizmor: ignore[concurrency-limits]

on:
  workflow_call:
    inputs:
      upload-grype-artifact:
        description: "Whether to upload the generated Grype SARIF artifacts"
        type: "boolean"
        default: false
      upload-grype-sarif:
        description: "Whether to upload the generated Grype SARIFs to Security"
        type: "boolean"
        default: false
# enq: the only way to set permissions to none in GH Actions
permissions: {} # yamllint disable-line rule:braces

jobs:
  sbom-legal:
    name: "SBOM Legal"
    permissions:
      actions: "read" # https://github.com/github/codeql-action/issues/2117
      security-events: "write" # Needed to upload SARIF file to tab
      contents: "read"
      id-token: "write" # Needed to get GH Token to attest
      attestations: "write" # Needed to upload attestation
    # enq: hash with name and version always longer than 80 chars
    # yamllint disable rule:line-length
    # enq: unpinned as it allows projects to use the latest
    uses: "open-nudge/opentemplate/.github/workflows/security-sbom-legal-reusable.yml@main" # zizmor: ignore[unpinned-uses]
    # yamllint enable rule:line-length
    with:
      upload-artifact: true
      upload-grype-artifact: "${{ inputs.upload-grype-artifact }}"
      upload-grype-sarif: "${{ inputs.upload-grype-sarif }}"
      attest: true

  sbom-python:
    name: "SBOM Python"
    permissions:
      actions: "read" # https://github.com/github/codeql-action/issues/2117
      security-events: "write" # Needed to upload SARIF file to tab
      contents: "read"
      id-token: "write" # Needed to get GH Token to attest
      attestations: "write" # Needed to upload attestation
    # enq: hash with name and version always longer than 80 chars
    # yamllint disable rule:line-length
    # enq: unpinned as it allows projects to use the latest
    uses: "open-nudge/opentemplate/.github/workflows/security-sbom-python-reusable.yml@main" # zizmor: ignore[unpinned-uses]
    # yamllint enable rule:line-length
    with:
      upload-artifact: true
      upload-grype-artifact: "${{ inputs.upload-grype-artifact }}"
      upload-grype-sarif: "${{ inputs.upload-grype-sarif }}"
      attest: true

  sbom-github:
    name: "SBOM GitHub"
    permissions:
      actions: "read" # https://github.com/github/codeql-action/issues/2117
      security-events: "write" # Needed to upload SARIF file to tab
      contents: "read"
      id-token: "write" # Needed to get GH Token to attest
      attestations: "write" # Needed to upload attestation
    # enq: hash with name and version always longer than 80 chars
    # yamllint disable rule:line-length
    # enq: unpinned as it allows projects to use the latest
    uses: "open-nudge/opentemplate/.github/workflows/security-sbom-github-reusable.yml@main" # zizmor: ignore[unpinned-uses]
    # yamllint enable rule:line-length
    with:
      upload-artifact: true
      upload-grype-artifact: "${{ inputs.upload-grype-artifact }}"
      upload-grype-sarif: "${{ inputs.upload-grype-sarif }}"
      attest: true
...
