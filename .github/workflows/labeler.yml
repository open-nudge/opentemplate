---
name: "Labeler"

on:
  # enq: can be used as it's a low-risk action with no custom code execution
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types:
      - "opened"
      - "edited"
      - "synchronize"
      - "reopened"
  merge_group:
    types:
      - "checks_requested"

# enq: the only way to set permissions to none in GH Actions
permissions: {} # yamllint disable-line rule:braces

concurrency:
  group: >
    ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    timeout-minutes: 10
    name: "Labeler"
    permissions:
      pull-requests: "write" # Needed to create label
    runs-on: "ubuntu-latest"
    steps:
      - name: "Harden Runner"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
        # yamllint enable rule:line-length
        with:
          disable-sudo-and-containers: true
          egress-policy: "block"
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
      - name: "Checkout repository"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        # yamllint enable rule:line-length
        with:
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: "Label PR"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "actions/labeler@f27b608878404679385c85cfa523b85ccb86e213" # v6.1.0
        # yamllint enable rule:line-length
        with:
          configuration-path: "./.github/label-path.yml"
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
      - name: "PR Labeler"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "github/issue-labeler@c1b0f9f52a63158c4adc09425e858e87b32e9685" # v3.4
        # yamllint enable rule:line-length
        with:
          configuration-path: ".github/label-title.yml"
          enable-versioned-regex: 0
          sync-labels: 1
          include-title: 1
          include-body: 0
...
