---
name: "Release SBOMs Test"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - ".grype.yaml"
      - ".github/actions/sbom-grype/action.yml"
      - ".github/actions/sarif-upload/action.yml"
      - ".github/actions/pdm-*/action.yml"
      - ".github/actions/git-setup/action.yml"
      - ".github/actions/release-sbom-setup/action.yml"
      - ".github/workflows/security-sbom-attest-reusable.yml"
      - ".github/workflows/security-sbom-run-reusable.yml"
      - ".github/workflows/release-sboms-test.yml"
      - ".github/workflows/release-sboms-reusable.yml"
      - ".github/workflows/security-sbom-github-reusable.yml"
      - ".github/workflows/security-sbom-github-update.yml"
      - ".github/workflows/security-sbom-github.yml"
      - ".github/workflows/security-sbom-legal-reusable.yml"
      - ".github/workflows/security-sbom-legal-update.yml"
      - ".github/workflows/security-sbom-legal.yml"
      - ".github/workflows/security-sbom-python-reusable.yml"
      - ".github/workflows/security-sbom-python-update.yml"
      - ".github/workflows/security-sbom-python.yml"
  merge_group:
    types:
      - "checks_requested"
  workflow_dispatch:

# enq: the only way to set permissions to none in GH Actions
permissions: {} # yamllint disable-line rule:braces

jobs:
  release-sboms-test:
    name: "Release SBOMs Test"
    permissions:
      actions: "read" # https://github.com/github/codeql-action/issues/2117
      security-events: "write" # Needed to upload SARIF file to tab
      id-token: "write" # Needed to get GH Token to attest
      attestations: "write" # Needed to upload attestation
      contents: "read"
    # enq: hash with name and version always longer than 80 chars
    # yamllint disable rule:line-length
    # enq: unpinned as it allows projects to use the latest
    uses: "open-nudge/opentemplate/.github/workflows/release-sboms-reusable.yml@main" # zizmor: ignore[unpinned-uses]
    # yamllint enable rule:line-length
    with:
      upload-grype-artifact: false
      upload-grype-sarif: false
...
