---
name: "XML"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "**.xml"
      - ".github/actions/pdm-*.yml"
      - ".github/workflows/xml.yml"
      - ".github/workflows/xml-reusable.yml"
      - ".github/workflows/run-*reusable.yml"
  merge_group:
    types:
      - "checks_requested"

# enq: the only way to set permissions to none in GH Actions
permissions: {} # yamllint disable-line rule:braces

concurrency:
  group: >
    ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  xml:
    name: "XML"
    permissions:
      contents: "read"
    # enq: hash with name and version always longer than 80 chars
    # yamllint disable rule:line-length
    # enq: unpinned as it allows projects to use the latest
    uses: "./.github/workflows/xml-reusable.yml"
    # yamllint enable rule:line-length
...
