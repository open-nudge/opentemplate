---
name: "prek Config"

on:
  pull_request:
    branches:
      - "main"
    paths:
      - ".github/actions/pdm-*.yml"
      - ".prek.toml"
      - ".github/workflows/prek-config.yml"
      - ".github/workflows/run-*reusable.yml"
  merge_group:
    types:
      - "checks_requested"

# enq: the only way to set permissions to none in GH Actions
permissions: {} # yamllint disable-line rule:braces

concurrency:
  group: >
    ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prek:
    name: "prek"
    permissions:
      contents: "read"
    # enq: hash with name and version always longer than 80 chars
    # yamllint disable rule:line-length
    # enq: unpinned as it allows projects to use the latest
    uses: "./.github/workflows/run-check-reusable.yml"
    # yamllint enable rule:line-length
    with:
      check: "prek-config"
      group: "prek"
      sparse-checkout: |
        prek.toml
...
