---
# enq: reusable workflows offload concurrency limits to the caller
name: "Security OSV-Scanner Reusable"  # zizmor: ignore[concurrency-limits]

on:
  workflow_call:
    inputs:
      name:
        description: "Name of the artifact (default: '' - no artifact upload)"
        type: "string"
        default: ""
      sarif:
        description: "Upload SARIF file to CodeQL"
        type: "boolean"
        default: false
      continue-on-error:
        description: "Whether to continue on error"
        type: "boolean"
        default: false
      file:
        description: "Name/path of the created SARIF file"
        type: "string"
        default: "osv-scanner.sarif"

# enq: the only way to set permissions to none in GH Actions
permissions: {} # yamllint disable-line rule:braces

jobs:
  security-osv-scanner-reusable:
    name: "Security OSV-Scanner Reusable"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    permissions:
      actions: "read" # https://github.com/github/codeql-action/issues/2117
      security-events: "write" # Needed to to upload SARIF file to tab
      contents: "read"
    steps:

      - name: "Harden Runner"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
        # yamllint enable rule:line-length
        with:
          # Uses docker container,
          # disable-sudo-and-containers impossible
          disable-sudo: true
          egress-policy: "block"
          allowed-endpoints: >
            api.deps.dev:443
            api.github.com:443
            api.osv.dev:443
            github.com:443
      - name: "Checkout repository"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        # yamllint enable rule:line-length
        with:
          persist-credentials: false
      - name: "Run scanner"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        uses: "google/osv-scanner/actions/scanner@408fcd6f8707999a29e7ba45e15809764cf24f67" # v2.3.8
        # yamllint enable rule:line-length
        continue-on-error: "${{ inputs.continue-on-error }}"
        with:
          scan-args: |-
            --format=sarif
            --output=${{ inputs.file }}
            --recursive
            --licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,Unlicense,Zlib,OFL-1.1,0BSD,PSF-2.0
            ./
      - name: "Upload files"
        # enq: hash with name and version always longer than 80 chars
        # yamllint disable rule:line-length
        # enq: unpinned as it allows projects to use the latest
        uses: "open-nudge/opentemplate/.github/actions/sarif-upload@main" # zizmor: ignore[unpinned-uses]
        # yamllint enable rule:line-length
        with:
          name: "${{ inputs.name }}"
          file: "${{ inputs.file }}"
          sarif: "${{ inputs.sarif }}"
...
